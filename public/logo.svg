<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 100" width="320" height="100">
  <defs>
    <filter id="roughLogo" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" result="noise" seed="7"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="3"/>
    </filter>
  </defs>

  <!-- Icon mark -->
  <rect x="0" y="10" width="80" height="80" rx="16" fill="#0d0d0d"/>
  <text x="11" y="62" font-family="Arial, sans-serif" font-size="46" font-weight="800" fill="#e8e8e8">FH</text>
  <g filter="url(#roughLogo)">
    <path d="M10,72 C18,80 32,62 46,73 C58,82 70,66 78,75"
          stroke="#e0353c" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.95"/>
  </g>
  <circle cx="80" cy="78" r="2" fill="#e0353c" opacity="0.9"/>

  <!-- Wordmark -->
  <text x="100" y="50" font-family="Arial, sans-serif" font-size="34" font-weight="800" fill="#e8e8e8">Fin<tspan fill="#e0353c">Hawk</tspan></text>
  <text x="100" y="74" font-family="Arial, sans-serif" font-size="11" font-weight="600" letter-spacing="3" fill="#888888">CONTROLE. FOCO. LIBERDADE.</text>
</svg>
