<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 140" width="140" height="140">
  <defs>
    <filter id="rough" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" result="noise" seed="7"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="140" height="140" rx="22" fill="#0d0d0d"/>

  <!-- FH letters -->
  <text x="20" y="78" font-family="Arial, sans-serif" font-size="64" font-weight="800" fill="#e8e8e8">FH</text>

  <!-- Spray signature stroke -->
  <g filter="url(#rough)">
    <path d="M18,100 C28,112 48,82 70,102 C88,118 108,90 128,108"
          stroke="#e0353c" stroke-width="5.5" fill="none" stroke-linecap="round" opacity="0.95"/>
  </g>

  <!-- Drip -->
  <path d="M70,102 C69,109 68,116 71,121" stroke="#e0353c" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.5"/>

  <!-- Paint splatter dots -->
  <circle cx="134" cy="111" r="2.5" fill="#e0353c" opacity="0.9"/>
  <circle cx="139" cy="117" r="1.4" fill="#e0353c" opacity="0.6"/>
</svg>
